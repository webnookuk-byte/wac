<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Without a Clasp — Permanent jewellery, hand-welded to fit you. Coming soon."/>
  <title>Without a Clasp — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+SC:wght@300;400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sage:    #CAD9C2;
      --gold:    #C9A84C;
      --charcoal:#2C302A;
      --cream:   #FDFAF4;
      --text:    #38382e;
      --mid:     #7a7a6e;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--charcoal);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    /* Subtle decorative rule */
    .rule {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      margin: 0 auto 2.5rem;
    }

    .wordmark {
      font-family: 'Cormorant SC', serif;
      font-weight: 300;
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cream);
      margin-bottom: 0.5rem;
    }

    .wordmark span {
      color: var(--gold);
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--sage);
      letter-spacing: 0.04em;
      margin-bottom: 3rem;
    }

    .rule-bottom {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 2rem;
      opacity: 0.6;
    }

    .message {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sage);
      opacity: 0.75;
      margin-bottom: 2.5rem;
    }

    .contact-link {
      display: inline-block;
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--cream);
      text-decoration: none;
      border: 1px solid rgba(201,168,76,0.5);
      padding: 0.75rem 2rem;
      transition: border-color 0.3s, color 0.3s;
    }

    .contact-link:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    footer {
      position: absolute;
      bottom: 1.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--mid);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="rule"></div>

  <p class="wordmark">Without a <span>Clasp</span></p>
  <p class="tagline">Permanent jewellery, hand-welded to fit you.</p>

  <div class="rule-bottom"></div>

  <p class="message">Something beautiful is on its way</p>

  <a class="contact-link" href="mailto:hello@withoutaclasp.co.uk">Get in touch</a>

  <footer>&copy; 2026 Without a Clasp</footer>

</body>
</html>
